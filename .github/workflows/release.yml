name: Release

on:
  push:
    tags:
      - "v*"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  wait-for-ci:
    runs-on: ubuntu-latest
    permissions:
      checks: read
    steps:
      - name: Wait for CI checks
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          SHA="${{ github.sha }}"
          REPO="${{ github.repository }}"
          for i in $(seq 1 30); do
            RESULT=$(gh api "repos/$REPO/commits/$SHA/check-runs" \
              --jq '[.check_runs[] | select(.name == "build-and-test" or .name == "docker-smoke-test")] |
                    if length < 2 then "pending"
                    elif all(.status == "completed") then
                      if all(.conclusion == "success") then "success" else "failure" end
                    else "pending" end')
            echo "Attempt $i: $RESULT"
            if [ "$RESULT" = "success" ]; then exit 0; fi
            if [ "$RESULT" = "failure" ]; then echo "CI failed — aborting release"; exit 1; fi
            sleep 30
          done
          echo "Timed out waiting for CI"; exit 1

  publish:
    needs: wait-for-ci
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
